<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>학비계산기 — 유학원 도우미</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    :root {
      --p: #2563eb; --p-light: #eff6ff; --p-dark: #1d4ed8;
      --bg: #f0f2f7; --surface: #fff; --border: #e8eaed; --muted: #6b7280;
      --radius: 14px; --radius-sm: 10px; --shadow: 0 1px 12px rgba(0,0,0,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Pretendard', -apple-system, sans-serif; color: #111827; }
    #shell { max-width: 1080px; margin: 0 auto; padding: 28px 16px; }
    .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    /* ── 탑바 ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .brand-area { display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 20px; }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
    .brand-company { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; }
    .brand-sub { font-size: .78rem; color: var(--muted); }
    .topbar-actions { display: flex; gap: 8px; }

    /* ── 상태 뱃지 ── */
    .db-status { display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
    .db-status.ok   { background: #dcfce7; color: #16a34a; }
    .db-status.err  { background: #fee2e2; color: #dc2626; }
    .db-status.loading { background: #f3f4f6; color: var(--muted); }

    /* ── 액션바 ── */
    .action-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 16px; background: var(--surface); border-radius: var(--radius-sm); box-shadow: var(--shadow); }

    /* ── 카드 ── */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-header-title { font-weight: 700; font-size: .95rem; }
    .card-body { padding: 20px; }

    /* ── 폼 ── */
    .field { }
    .field label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .form-control { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .9rem; font-family: inherit; outline: none; }
    .form-control:focus { border-color: var(--p); box-shadow: 0 0 0 3px color-mix(in srgb, var(--p) 15%, transparent); }
    .form-select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .9rem; font-family: inherit; outline: none; background: #fff; }
    .form-select.invalid { border-color: #f87171; color: #dc2626; }
    .grid-4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .input-group { display: flex; }
    .input-group .form-control { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .input-group-text { padding: 0 12px; background: #f9fafb; border: 1.5px solid var(--border); border-left: 0; font-size: .85rem; color: var(--muted); display: flex; align-items: center; }
    .input-group-text:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .input-group-text:first-child { border-right: 0; border-left: 1.5px solid var(--border); border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .input-group .btn { flex-shrink: 0; white-space: nowrap; min-width: 52px; }

    /* ── 주수 컨트롤 ── */
    .week-ctrl { display: flex; }
    .week-ctrl .form-control { border-radius: 0; text-align: center; }
    .btn-step { padding: 0 14px; border: 1.5px solid var(--border); background: #f9fafb; cursor: pointer; font-size: 18px; color: #374151; transition: background .15s; font-family: inherit; }
    .btn-step:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); border-right: 0; }
    .btn-step:last-child  { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; border-left: 0; }
    .btn-step:hover { background: var(--p-light); color: var(--p); }

    /* ── 세그 행 ── */
    .seg-row { display: grid; grid-template-columns: 140px 90px 1fr auto; gap: 10px; align-items: end; margin-bottom: 10px; }
    .seg-add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border: 2px dashed #d1d5db; border-radius: var(--radius-sm); background: none; width: 100%; cursor: pointer; font-size: .84rem; font-weight: 600; color: var(--muted); font-family: inherit; transition: all .2s; margin-top: 6px; }
    .seg-add-btn:hover { border-color: var(--p); color: var(--p); background: var(--p-light); }
    .seg-add-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── 현지납부 ── */
    .fee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .fee-item label { font-size: .8rem; font-weight: 600; color: #374151; display: flex; justify-content: space-between; }
    .fee-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }

    /* ── 할인 ── */
    .disc-table { width: 100%; border-collapse: collapse; }
    .disc-table td { padding: 8px 4px; font-size: .88rem; }
    .disc-table td:last-child { text-align: right; }

    /* ── 요약 ── */
    .sum-total { font-size: 2rem; font-weight: 800; letter-spacing: -.03em; color: var(--p); }

    /* ── 버튼 ── */
    .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: all .15s; }
    .btn-primary { background: var(--p); color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline { background: none; border: 1.5px solid var(--border); color: #374151; }
    .btn-outline:hover { border-color: var(--p); color: var(--p); }
    .btn-danger-outline { background: none; border: 1.5px solid #fecaca; color: #dc2626; }

    .placeholder-box { padding: 16px; border: 1.5px dashed #d1d5db; border-radius: var(--radius-sm); color: var(--muted); font-size: .88rem; }

    .section-badge { display: inline-block; font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--p-light); color: var(--p); margin-left: 8px; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,.1); border-top-color: var(--p); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print { .no-print { display: none !important; } body { background: #fff; } #shell { padding: 0; } .card { box-shadow: none; } }
  </style>
</head>
<body>
<div id="shell">

  <!-- 탑바 -->
  <div class="topbar no-print">
    <div class="brand-area">
      <div class="brand-logo" id="brandLogo">🏢</div>
      <div>
        <div class="brand-company" id="brandCompany">로드 중…</div>
        <div class="brand-sub" id="brandSub"></div>
      </div>
    </div>
    <div class="topbar-actions">
      <a href="dashboard.html" class="btn btn-outline">← 대시보드</a>
    </div>
  </div>

  <!-- 액션바 -->
  <div class="action-bar no-print">
    <div id="dbStatus" class="db-status loading"><span class="spinner"></span> 데이터 로드 중…</div>
    <button id="btnRefresh" class="btn btn-outline">새로고침</button>
    <div style="flex:1;"></div>
    <button id="btnAddCompare" class="btn btn-primary" disabled>📋 학비 비교 +</button>
    <button id="btnOpenCompare" class="btn btn-outline" disabled>비교표 열기</button>
    <span id="syncStatus" style="font-size:.82rem;color:var(--muted);"></span>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-header"><span class="card-header-title">기본 정보</span></div>
    <div class="card-body">
      <div class="grid-4" style="margin-bottom:14px;">
        <div class="field"><label>학원명</label>
          <select id="schoolSelect" class="form-select" disabled><option>데이터 로드 중…</option></select></div>
        <div class="field"><label>입학금 (원)
          <button id="btnResetAdm" class="no-print" style="display:none;background:none;border:none;color:#dc2626;cursor:pointer;font-size:12px;">×초기화</button>
          </label>
          <div class="input-group">
            <input id="admissionFee" class="form-control mono" disabled>
            <button id="btnEditAdm" class="btn btn-outline no-print" style="border-radius:0 var(--radius-sm) var(--radius-sm) 0;border-left:0;">수정</button>
          </div>
        </div>
        <div class="field"><label>연수 기간 (주)</label>
          <div class="week-ctrl">
            <button id="weeksDec" class="btn-step">−</button>
            <input id="totalWeeks" class="form-control mono" value="4" inputmode="numeric">
            <button id="weeksInc" class="btn-step">+</button>
          </div>
        </div>
        <div class="field"><label>환율 (1페소 = ? 원)</label>
          <div class="input-group">
            <input id="rate" class="form-control mono" value="25" inputmode="numeric">
            <span class="input-group-text">원</span>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label>등록일</label><input id="regDate" class="form-control" placeholder="YYYY-MM-DD"></div>
        <div class="field"><label>출발일</label><input id="startDate" class="form-control" placeholder="YYYY-MM-DD"></div>
      </div>
    </div>
  </div>

  <!-- 코스 -->
  <div class="card">
    <div class="card-header">
      <span class="card-header-title">코스 <span class="section-badge" id="courseRemain">남은 주수: 0</span></span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="courseTotalLabel" style="font-size:.84rem;color:var(--muted);"></span>
        <button id="addCourseSeg" class="btn btn-outline no-print" disabled>+ 코스 추가</button>
      </div>
    </div>
    <div class="card-body"><div id="courseSegList"></div></div>
  </div>

  <!-- 기숙사 -->
  <div class="card">
    <div class="card-header">
      <span class="card-header-title">기숙사 <span class="section-badge" id="dormRemain">남은 주수: 0</span></span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="dormTotalLabel" style="font-size:.84rem;color:var(--muted);"></span>
        <button id="addDormSeg" class="btn btn-outline no-print" disabled>+ 기숙사 추가</button>
      </div>
    </div>
    <div class="card-body"><div id="dormSegList"></div></div>
  </div>

  <!-- 현지납부 -->
  <div class="card">
    <div class="card-header"><span class="card-header-title">현지납부 (페소)</span></div>
    <div class="card-body"><div id="localFees" class="fee-grid"></div></div>
  </div>

  <!-- 할인 -->
  <div class="card">
    <div class="card-header"><span class="card-header-title">할인</span></div>
    <div class="card-body">
      <div class="no-print" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;">
        <label><input type="checkbox" id="chkAdmDisc"> 입학금 할인</label>
        <label><input type="checkbox" id="chkLong"> 장기연수</label>
        <label><input type="checkbox" id="chkEarly"> 얼리버드</label>
        <label><input type="checkbox" id="chkPromo"> 성수기</label>
        <label><input type="checkbox" id="chkEtc"> 기타</label>
      </div>
      <div id="promoWarn" style="display:none;background:#fef3c7;border-radius:8px;padding:8px 12px;font-size:.82rem;margin-bottom:10px;">⚠️ 성수기 할인은 출발일 기준으로 자동 적용됩니다.</div>
      <table class="disc-table">
        <tbody id="discountLines"></tbody>
        <tfoot><tr><td style="font-weight:700;">할인 합계</td><td style="font-weight:700;color:#dc2626;" class="mono" id="discountTotal">0원</td></tr></tfoot>
      </table>
    </div>
  </div>

  <!-- 요약 -->
  <div class="card">
    <div class="card-header">
      <span class="card-header-title">요약</span>
      <button id="btnRecalc" class="btn btn-primary no-print">계산하기</button>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;margin-bottom:16px;">
        <div><div style="font-size:.8rem;color:var(--muted);">코스</div><div class="mono" style="font-weight:700;" id="sumCourse">0원</div></div>
        <div><div style="font-size:.8rem;color:var(--muted);">기숙사</div><div class="mono" style="font-weight:700;" id="sumDorm">0원</div></div>
        <div><div style="font-size:.8rem;color:var(--muted);">현지납부</div><div class="mono" style="font-weight:700;" id="sumLocal">0 페소</div></div>
        <div><div style="font-size:.8rem;color:var(--muted);">한국납부 합계</div><div class="sum-total" id="sumTotal">0원</div></div>
      </div>
      <div style="font-size:.78rem;color:var(--muted);text-align:right;" id="sumNow"></div>
      <div class="no-print" style="display:flex;gap:10px;margin-top:16px;">
        <button id="btnAddCompare2" class="btn btn-primary" style="flex:1;" disabled>📋 학비 비교에 추가</button>
      </div>
    </div>
  </div>

</div>

<script src="firebase-config.js"></script>
<script src="_shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, orderBy, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);
const $ = id => document.getElementById(id);

const COMPARE_KEY = "tuition_compares_v2";
const COMPARE_FILE = "compare.html";
const LOCAL_FEE_KEYS = [
  ["ssp","SSP"],["ecard","E-card"],["visa_ext","비자연장"],
  ["student_id","학생증"],["admin_fee","행정비"],["pickup","픽업"],
  ["textbook","교재비"],["deposit","보증금"]
];
const DISC_LABELS = { admission:"입학금 할인", longterm:"장기연수 할인", regdate:"얼리버드", startdate:"성수기 할인", etc:"기타 할인" };

let currentUser = null, memberData = null, schoolsMap = new Map(), schoolData = null;
let admissionOriginal=0, admissionValue=0, admissionEditing=false;
let localFeesOriginal={}, localFees={}, localFeesOverrides={}, localFeesEditing={};
let courseSegs=[], dormSegs=[];
let discOrder=["longterm","regdate","startdate","etc","admission"];
let discountOriginal={}, discountValue={}, discountOverridden={}, discountEditing={};

const fmtN = n => Math.round(Number(n)||0).toLocaleString("en-US");
const toNum = v => { const s=String(v??"").trim().replace(/\D/g,""); const n=Number(s); return Number.isFinite(n)?n:0; };
const clampW = v => Math.min(24,Math.max(1,Number(String(v??"").replace(/\D/g,""))||1));
const isNone = v => { const s=String(v??"").trim().toLowerCase(); return s===""||s==="none"||s==="null"; };
const inRange = (d,s,e) => !!(d&&s&&e&&d>=s&&d<=e);

function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ── 인증 가드 ──
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = "auth.html"; return; }
  currentUser = user;
  // 관리자 여부 체크
  const admSnap = await getDoc(doc(db,"config","admins"));
  const admCfg  = admSnap.exists() ? admSnap.data() : {};
  const superUids = admCfg.uids || [];
  const subUids   = admCfg.subUids || [];
  const isAdminUser = superUids.includes(user.uid) || subUids.includes(user.uid);

  const snap = await getDoc(doc(db,"members",user.uid));
  if (!isAdminUser && (!snap.exists() || snap.data().status !== "approved")) {
    window.location.href = "auth.html"; return;
  }

  memberData = snap.exists() ? snap.data() : {
    companyName: "관리자", slogan: "", consultantName: "", consultantPhone: "",
    primaryColor: "#2563eb", logoUrl: ""
  };
  applyMemberBranding(memberData);

  // 계산기 상단에 관리자 뒤로가기 표시
  if (isAdminUser) {
    const backBtn = document.querySelector("a[href='dashboard.html']");
    if (backBtn) { backBtn.href = "admin.html"; backBtn.textContent = "← 관리자"; }
  }

  loadFromFirebase();
});

function applyMemberBranding(m) {
  if (m?.primaryColor) document.documentElement.style.setProperty("--p", m.primaryColor);
  $("brandCompany").textContent = m.companyName || "학비계산기";
  $("brandSub").textContent = m.slogan || "";
  if (m.logoUrl) $("brandLogo").innerHTML = `<img src="${m.logoUrl}" alt="로고">`;
}

// ── Firebase 로드 ──
async function loadFromFirebase() {
  $("dbStatus").className = "db-status loading";
  $("dbStatus").innerHTML = `<span class="spinner"></span> 로드 중…`;
  try {
    const q = query(collection(db,"schools"), orderBy("school_name"));
    const snap = await getDocs(q);
    schoolsMap = new Map();
    snap.forEach(d => schoolsMap.set(d.id, d.data()));
    populateSchoolSelect();
    $("dbStatus").className = "db-status ok";
    $("dbStatus").innerHTML = `✓ ${schoolsMap.size}개 학원`;
    $("btnAddCompare").disabled = false; $("btnAddCompare2").disabled = false; $("btnOpenCompare").disabled = false;
  } catch(e) {
    $("dbStatus").className = "db-status err";
    $("dbStatus").innerHTML = `✗ 로드 실패`;
  }
}
$("btnRefresh").addEventListener("click", loadFromFirebase);

function populateSchoolSelect() {
  $("schoolSelect").innerHTML = `<option value="" disabled selected>학원을 선택하세요</option>`;
  for (const [code, d] of [...schoolsMap.entries()].sort((a,b) => (a[1].school_name||"").localeCompare(b[1].school_name||""))) {
    const opt = document.createElement("option"); opt.value = code; opt.textContent = d.school_name || code;
    $("schoolSelect").appendChild(opt);
  }
  $("schoolSelect").disabled = schoolsMap.size === 0;
}

function loadSchool(code) {
  const data = schoolsMap.get(code); if (!data) return;
  schoolData = data;
  admissionOriginal = Number(data.admission_fee_krw||0); admissionValue = admissionOriginal; admissionEditing = false;
  $("admissionFee").value = fmtN(admissionValue); $("admissionFee").disabled = true;
  $("btnEditAdm").textContent = "수정"; $("btnResetAdm").style.display = "none";
  localFeesOriginal = data.local_fees || {}; localFees = {...localFeesOriginal}; localFeesOverrides = {}; localFeesEditing = {};
  discountOriginal = {}; discountValue = {}; discountOverridden = {}; discountEditing = {};
  courseSegs = []; dormSegs = [];
  $("addCourseSeg").disabled = false; $("addDormSeg").disabled = false;
  renderAll();
}
$("schoolSelect").addEventListener("change", () => loadSchool($("schoolSelect").value));

// ── 가격 계산 ──
function priceByWeeks(item, weeks) {
  const w = Number(weeks)||1;
  if(w===1) return Number(item.price_1w)||0;
  if(w===2) return Number(item.price_2w)||0;
  if(w===3) return Number(item.price_3w)||0;
  return (Number(item.price_per_week_4p)||0)*w;
}
function totalWeeksOfSegs(segs){ return segs.reduce((a,s)=>a+(Number(s.weeks)||0),0); }
function sumSegCosts(segs,list,key){ return segs.reduce((s,seg)=>{ const item=list.find(x=>x[key]===seg[key]); return s+(item?priceByWeeks(item,seg.weeks):0); },0); }
function ruleDiscount(r,base){ const t=String(r.type||"").toLowerCase(),v=Number(r.value||0); return t==="percent"?Math.round(base*v/100):Math.round(v); }
function baseByTarget(target,adm,course,dorm){ if(target==="course") return course; if(target==="dorm") return dorm; if(target==="both") return course+dorm; return adm+course+dorm; }
function autoDiscount(key,adm,course,dorm,weeks){
  const dr=schoolData?.discount_rules||{};
  if(key==="admission") return Number(dr.admission_discount||0);
  if(key==="longterm"){ const r=(dr.longterm_rules||[]).find(r=>weeks>=(Number(r.min_weeks)||4)); return r?ruleDiscount(r,baseByTarget(r.target,adm,course,dorm)):0; }
  if(key==="regdate"){ const r=(dr.regdate_rules||[]).find(r=>inRange($("regDate").value,r.start,r.end)); return r?ruleDiscount(r,baseByTarget(r.target,adm,course,dorm)):0; }
  if(key==="startdate"){ const r=(dr.startdate_rules||[]).find(r=>inRange($("startDate").value,r.start,r.end)); return r?ruleDiscount(r,baseByTarget(r.target,adm,course,dorm)):0; }
  return 0;
}

// ── 세그 ──
function addSeg(type){ const segs=type==="course"?courseSegs:dormSegs; const remain=clampW($("totalWeeks").value)-totalWeeksOfSegs(segs); if(remain<=0) return; segs.push({[type==="course"?"course_name":"dorm_name"]:"",weeks:remain}); renderSegs(type); }
function autoFixSegs(type){ const total=clampW($("totalWeeks").value),segs=type==="course"?courseSegs:dormSegs; let sum=0; for(let i=0;i<segs.length;i++){ if(i<segs.length-1){ sum+=segs[i].weeks; }else{ segs[i].weeks=Math.max(1,total-sum); } } }

function renderSegs(type) {
  const total=clampW($("totalWeeks").value), segs=type==="course"?courseSegs:dormSegs;
  const list=type==="course"?(schoolData?.courses||[]):(schoolData?.dorms||[]);
  const key=type==="course"?"course_name":"dorm_name", label=type==="course"?"코스":"기숙사";
  const host=$(`${type}SegList`), addBtn=$(`add${type==="course"?"Course":"Dorm"}Seg`);
  host.innerHTML="";
  if(!schoolData){ host.innerHTML=`<div class="placeholder-box">학원을 선택하세요</div>`; return; }
  if(!segs.length){ host.innerHTML=`<div class="placeholder-box">+ ${label} 추가 버튼으로 구간을 추가하세요</div>`; addBtn.disabled=(total<=0); return; }
  let start=1;
  segs.forEach((seg,idx)=>{
    const end=start+seg.weeks-1, selItem=list.find(x=>x[key]===seg[key]), cost=selItem?priceByWeeks(selItem,seg.weeks):0;
    const row=document.createElement("div"); row.className="seg-row";
    row.innerHTML=`
      <div class="field"><label>구간</label><div class="form-control" style="background:#f9fafb;">${start}~${end}주</div></div>
      <div class="field"><label>주수</label><input class="form-control mono" data-weeks type="text" inputmode="numeric" value="${seg.weeks}"></div>
      <div class="field"><label>${label} <span style="color:var(--muted);font-size:.78rem;font-weight:400;">${fmtN(cost)}원</span></label>
        <select class="form-select ${seg[key]?"":"invalid"}" data-sel>
          <option value="" disabled ${seg[key]?"":"selected"}>선택하세요</option>
          ${list.map(x=>`<option value="${esc(x[key])}" ${x[key]===seg[key]?"selected":""}>${esc(x[key])}</option>`).join("")}
        </select></div>
      <div class="field" style="padding-top:22px;"><button class="btn btn-danger-outline no-print" data-del>삭제</button></div>`;
    row.querySelector("[data-weeks]").addEventListener("input",e=>{ seg.weeks=Math.max(1,clampW(e.target.value)); autoFixSegs(type); renderSegs(type); setRemainLabels(); clearSummary(); });
    row.querySelector("[data-sel]").addEventListener("change",e=>{ seg[key]=e.target.value; renderSegs(type); clearSummary(); });
    row.querySelector("[data-del]").addEventListener("click",()=>{ segs.splice(idx,1); autoFixSegs(type); renderSegs(type); setRemainLabels(); clearSummary(); });
    host.appendChild(row); start=end+1;
  });
  addBtn.disabled=(total-totalWeeksOfSegs(segs))<=0;
}
function setRemainLabels(){
  const total=clampW($("totalWeeks").value);
  $("courseRemain").textContent=`남은 주수: ${Math.max(0,total-totalWeeksOfSegs(courseSegs))}`;
  $("dormRemain").textContent=`남은 주수: ${Math.max(0,total-totalWeeksOfSegs(dormSegs))}`;
}

// ── 현지납부 ──
function renderLocalFees(){
  const fees=$("localFees"); fees.innerHTML="";
  if(!schoolData){ fees.innerHTML=`<div class="placeholder-box" style="grid-column:1/-1;">학원을 선택하세요</div>`; return; }
  const rate=toNum($("rate").value);
  LOCAL_FEE_KEYS.forEach(([k,label])=>{
    const origRaw=localFeesOriginal?.[k],origNone=isNone(origRaw),original=origNone?0:Number(origRaw||0);
    const current=isNone(localFees?.[k])?0:Number(localFees?.[k]||0), overridden=Object.hasOwn(localFeesOverrides,k), editing=!!localFeesEditing[k];
    const div=document.createElement("div"); div.className="fee-item";
    div.innerHTML=`
      <label style="margin-bottom:5px;">${label}${overridden?`<button style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:11px;" data-reset>×초기화</button>`:""}</label>
      <div class="input-group">
        <input type="text" inputmode="numeric" class="form-control mono${overridden?" text-primary fw-bold":""}" value="${editing?String(current):fmtN(current)}" ${editing?"":"disabled"} placeholder="${origNone?"none":""}">
        <button class="btn btn-outline no-print" style="border-left:0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;" data-toggle ${origNone?"disabled":""}>${editing?"적용":"수정"}</button>
      </div>
      <div class="fee-sub mono">환산: ${fmtN(current*rate)}원</div>`;
    const input=div.querySelector("input");
    div.querySelector("[data-toggle]")?.addEventListener("click",()=>{
      if(origNone) return;
      if(!localFeesEditing[k]){ localFeesEditing[k]=true; input.disabled=false; input.value=String(current); input.focus(); renderLocalFees(); return; }
      localFeesEditing[k]=false; const v=toNum(input.value); localFees[k]=v;
      if(v!==original) localFeesOverrides[k]=v; else delete localFeesOverrides[k];
      renderLocalFees(); clearSummary();
    });
    input.addEventListener("input",()=>{ if(!localFeesEditing[k]) return; input.value=input.value.replace(/\D/g,""); localFees[k]=toNum(input.value); clearSummary(); });
    div.querySelector("[data-reset]")?.addEventListener("click",()=>{ delete localFeesOverrides[k]; localFeesEditing[k]=false; localFees[k]=origNone?"none":original; renderLocalFees(); clearSummary(); });
    fees.appendChild(div);
  });
}

// ── 할인 ──
function checkedDiscKeys(){ return ["admission","longterm","regdate","startdate","etc"].filter(k=>{ const m={admission:$("chkAdmDisc"),longterm:$("chkLong"),regdate:$("chkEarly"),startdate:$("chkPromo"),etc:$("chkEtc")}; return m[k]?.checked; }); }
function syncDiscount(){
  if(!schoolData) return;
  const weeks=clampW($("totalWeeks").value),adm=admissionValue,course=sumSegCosts(courseSegs,schoolData.courses||[],"course_name"),dorm=sumSegCosts(dormSegs,schoolData.dorms||[],"dorm_name");
  for(const k of checkedDiscKeys()){ const auto=autoDiscount(k,adm,course,dorm,weeks); discountOriginal[k]=auto; if(discountValue[k]===undefined) discountValue[k]=auto; if(!discountEditing[k]&&!discountOverridden[k]) discountValue[k]=auto; }
}
function discTotal(){ const checked=new Set(checkedDiscKeys()); return discOrder.filter(k=>checked.has(k)).reduce((s,k)=>s+Number(discountValue[k]||0),0); }
function renderDiscount(){
  if(!schoolData){ $("discountLines").innerHTML=`<tr><td colspan="2" style="color:var(--muted);text-align:center;padding:20px;">학원을 선택하세요</td></tr>`; $("discountTotal").textContent="0원"; return; }
  $("promoWarn").style.display=$("chkPromo").checked?"block":"none";
  syncDiscount();
  const checked=checkedDiscKeys();
  discOrder=discOrder.filter(k=>checked.includes(k)); for(const k of checked){ if(!discOrder.includes(k)) discOrder.push(k); }
  const rows=discOrder.map(k=>{
    const main=Number(discountValue[k]??0),editing=!!discountEditing[k],overridden=!!discountOverridden[k];
    return `<tr data-k="${k}"><td>${DISC_LABELS[k]||k}</td><td>
      <div class="input-group" style="justify-content:flex-end;">
        <input class="form-control mono${overridden?" text-primary":""}" data-main type="text" inputmode="numeric" style="max-width:130px;" value="${editing?String(main):fmtN(main)}" ${editing?"":"disabled"}>
        <button class="btn btn-outline no-print" style="border-left:0;" data-toggle>${editing?"적용":"수정"}</button>
        <button class="btn no-print" style="color:#dc2626;background:none;border:none;padding:0 6px;" data-reset ${overridden?"":"hidden"}>×</button>
      </div></td></tr>`;
  });
  $("discountLines").innerHTML=rows.length?rows.join(""):`<tr><td colspan="2" style="color:var(--muted);text-align:center;padding:20px;">할인 항목을 선택하세요</td></tr>`;
  $("discountLines").querySelectorAll("tr[data-k]").forEach(tr=>{
    const k=tr.dataset.k,input=tr.querySelector("[data-main]");
    tr.querySelector("[data-toggle]").addEventListener("click",()=>{ if(!discountEditing[k]){ discountEditing[k]=true; input.disabled=false; input.value=String(Number(discountValue[k]||0)); input.focus(); renderDiscount(); return; } discountEditing[k]=false; const v=toNum(input.value); discountValue[k]=v; discountOverridden[k]=(v!==Number(discountOriginal[k]||0)); renderDiscount(); clearSummary(); });
    input.addEventListener("input",()=>{ if(!discountEditing[k]) return; input.value=input.value.replace(/\D/g,""); discountValue[k]=toNum(input.value); clearSummary(); });
    tr.querySelector("[data-reset]")?.addEventListener("click",()=>{ discountEditing[k]=false; discountOverridden[k]=false; discountValue[k]=Number(discountOriginal[k]||0); renderDiscount(); clearSummary(); });
  });
  $("discountTotal").textContent=fmtN(discTotal())+"원";
}

// ── 요약 ──
function clearSummary(){ $("sumLocal").textContent="0 페소"; $("sumCourse").textContent="0원"; $("sumDorm").textContent="0원"; $("sumTotal").textContent="0원"; $("sumNow").textContent=""; $("courseTotalLabel").textContent=""; $("dormTotalLabel").textContent=""; }
function recalcSummary(){
  if(!schoolData){ clearSummary(); return; }
  const course=sumSegCosts(courseSegs,schoolData.courses||[],"course_name"),dorm=sumSegCosts(dormSegs,schoolData.dorms||[],"dorm_name"),disc=discTotal(),total=(admissionValue+course+dorm)-disc,rate=toNum($("rate").value);
  let php=0; for(const [k] of LOCAL_FEE_KEYS){ if(!isNone(localFees[k])) php+=Number(localFees[k]||0); }
  $("sumLocal").textContent=`${fmtN(php)} 페소 (${fmtN(php*rate)}원)`;
  $("sumCourse").textContent=`${fmtN(course)}원`; $("sumDorm").textContent=`${fmtN(dorm)}원`;
  $("sumTotal").textContent=`${fmtN(total)}원`; $("sumNow").textContent=new Date().toLocaleString();
  $("courseTotalLabel").textContent=`${fmtN(course)}원`; $("dormTotalLabel").textContent=`${fmtN(dorm)}원`;
}
function renderAll(){ renderSegs("course"); renderSegs("dorm"); setRemainLabels(); renderDiscount(); renderLocalFees(); clearSummary(); }

// ── 비교 데이터 빌드 ──
function loadCompares(){ try{ const r=localStorage.getItem(COMPARE_KEY); const a=r?JSON.parse(r):[]; return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function saveCompares(a){ try{ localStorage.setItem(COMPARE_KEY,JSON.stringify(a.slice(0,3))); }catch(e){} }
function buildCompareEntry(){
  recalcSummary();
  const weeks=clampW($("totalWeeks").value);
  function breakdown(segs,list,key,prefix){ let start=1,total=0; const rows=segs.map(seg=>{ const end=start+seg.weeks-1,item=list.find(x=>x[key]===seg[key]),cost=item?priceByWeeks(item,seg.weeks):0; total+=cost; const r={label:`${prefix} ${start}~${end}주`,name:seg[key]||"",weeks:seg.weeks,cost}; start=end+1; return r; }); return {rows,total}; }
  const cb=breakdown(courseSegs,schoolData.courses||[],"course_name","코스"),db2=breakdown(dormSegs,schoolData.dorms||[],"dorm_name","기숙사"),disc=discTotal(),rate=toNum($("rate").value);
  let php=0; for(const [k] of LOCAL_FEE_KEYS){ if(!isNone(localFees[k])) php+=Number(localFees[k]||0); }
  const checked=new Set(checkedDiscKeys());
  return {
    schoolName:$("schoolSelect").selectedOptions[0]?.textContent||"",
    quoteDate:new Date().toLocaleString(), totalWeeks:weeks,
    admissionFee:Math.round(admissionValue), courses:cb.rows, courseTotal:Math.round(cb.total),
    dorms:db2.rows, dormTotal:Math.round(db2.total),
    discountItems:discOrder.filter(k=>checked.has(k)).map(k=>({name:DISC_LABELS[k]||k,amount:Math.round(Number(discountValue[k]||0))})),
    discountTotal:Math.round(disc), pay:Math.round((admissionValue+cb.total+db2.total)-disc),
    localPhpTotal:Math.round(php), rate, localKrwTotal:Math.round(php*rate),
    // 브랜딩 정보 포함
    member:{ companyName:memberData?.companyName||"", slogan:memberData?.slogan||"", consultantName:memberData?.consultantName||"", consultantPhone:memberData?.consultantPhone||"", primaryColor:memberData?.primaryColor||"#2563eb", logoUrl:memberData?.logoUrl||"" }
  };
}

// ── 이벤트 ──
flatpickr("#regDate",   {dateFormat:"Y-m-d",allowInput:true});
flatpickr("#startDate", {dateFormat:"Y-m-d",allowInput:true});
$("btnRecalc").addEventListener("click", recalcSummary);
$("btnAddCompare2").addEventListener("click", () => $("btnAddCompare").click());
function onWeeksChange(){ $("totalWeeks").value=String(clampW($("totalWeeks").value)); autoFixSegs("course"); autoFixSegs("dorm"); renderSegs("course"); renderSegs("dorm"); setRemainLabels(); clearSummary(); }
$("weeksDec").addEventListener("click",()=>{ $("totalWeeks").value=String(clampW(Number($("totalWeeks").value)-1)); onWeeksChange(); });
$("weeksInc").addEventListener("click",()=>{ $("totalWeeks").value=String(clampW(Number($("totalWeeks").value)+1)); onWeeksChange(); });
$("totalWeeks").addEventListener("input", onWeeksChange);
$("rate").addEventListener("input",()=>{ $("rate").value=$("rate").value.replace(/\D/g,""); renderLocalFees(); clearSummary(); });
$("addCourseSeg").addEventListener("click",()=>addSeg("course"));
$("addDormSeg").addEventListener("click",()=>addSeg("dorm"));
[$("chkAdmDisc"),$("chkLong"),$("chkEarly"),$("chkPromo"),$("chkEtc")].forEach(el=>el.addEventListener("change",()=>{ renderDiscount(); clearSummary(); }));
[$("regDate"),$("startDate")].forEach(el=>el.addEventListener("change",()=>{ renderDiscount(); clearSummary(); }));

$("btnEditAdm").addEventListener("click",()=>{
  if(!schoolData) return;
  if(!admissionEditing){ admissionEditing=true; $("admissionFee").disabled=false; $("admissionFee").value=String(admissionValue); $("btnEditAdm").textContent="적용"; $("admissionFee").focus(); return; }
  admissionEditing=false; admissionValue=toNum($("admissionFee").value); $("admissionFee").disabled=true; $("admissionFee").value=fmtN(admissionValue); $("btnEditAdm").textContent="수정";
  $("btnResetAdm").style.display=(admissionValue!==admissionOriginal)?"inline":"none";
  renderDiscount(); clearSummary();
});
$("btnResetAdm").addEventListener("click",()=>{ admissionEditing=false; admissionValue=admissionOriginal; $("admissionFee").disabled=true; $("admissionFee").value=fmtN(admissionValue); $("btnEditAdm").textContent="수정"; $("btnResetAdm").style.display="none"; renderDiscount(); clearSummary(); });

$("btnAddCompare").addEventListener("click", async () => {
  if(!schoolData) return;
  const arr=loadCompares();
  if(arr.length>=3){ showToast("비교는 최대 3개까지 가능합니다.", "error"); return; }
  const entry=buildCompareEntry(); arr.push(entry); saveCompares(arr);
  $("syncStatus").textContent=`✓ 비교 ${arr.length}개 저장됨`;
  // Firestore에도 저장
  try {
    await addDoc(collection(db,"quotes"), { memberId:currentUser.uid, compares:arr, createdAt:serverTimestamp() });
  } catch(e) { console.warn("Firestore 저장 실패:", e); }
});
$("btnOpenCompare").addEventListener("click",()=>{
  const arr=loadCompares();
  if(arr.length===0&&schoolData){ arr.push(buildCompareEntry()); saveCompares(arr); }
  window.open(COMPARE_FILE,"_blank");
});
renderAll();
</script>
</body>
</html>
